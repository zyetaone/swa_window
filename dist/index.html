<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aircraft Window Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* Window Frame Overlay */
        #window-frame {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('/assets/window_frame.png') no-repeat center center;
            background-size: cover;
            pointer-events: none;
            z-index: 10;
        }
        
        /* UI Overlay */
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 20;
            background: rgba(0,0,0,0.7); color: #0f0; padding: 15px;
            border-radius: 8px; border: 1px solid #0f0;
        }
        #weather-indicator {
            position: absolute; top: 20px; right: 20px; z-index: 20;
            background: rgba(0,0,0,0.7); color: white; padding: 10px;
            text-align: right; border-radius: 8px;
        }
        button { background: #333; color: white; border: 1px solid #555; cursor: pointer; margin-top: 5px; padding: 5px; }
        button:hover { background: #555; }
        .hidden { display: none; }
    </style>
  <script type="module" crossorigin src="/assets/index-BcrNat-l.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="window-frame"></div> <!-- PNG overlay -->

    <div id="ui">
        <div><strong>MODE:</strong> <span id="mode-display">Circadian</span></div>
        <div><strong>LOC:</strong> <span id="loc-display">--</span></div>
        <div><strong>TIME:</strong> <span id="time-display">--</span></div>
        <div><strong>SUN ALT:</strong> <span id="sun-alt">--</span>°</div>
        <hr style="border-color: #444;">
        <button id="btn-simulate-blind">Simulate Blind Closed</button>
        <button id="btn-toggle-mode">Toggle Mode</button>
        <br>
        <label>Time Shift: <input type="range" id="time-slider" min="-12" max="12" step="0.5" value="0"></label>
    </div>

    <div id="weather-indicator">
        <div>☁️ <span id="cloud-val">0</span>%</div>
        <div>💨 <span id="wind-val">0</span> m/s</div>
        <div id="flight-icon" class="hidden" style="margin-top:5px; font-size: 20px;">✈️ FLIGHT ACTIVE</div>
    </div>

</body>
</html>
